<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 Earth Online</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0e1a;
    --card-bg: #111827;
    --card-border: #1e293b;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #6366f1;
    --red: #ef4444;
    --yellow: #eab308;
    --green: #22c55e;
    --pink: #ec4899;
    --blue: #3b82f6;
  }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 12px;
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(99,102,241,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(236,72,153,0.04) 0%, transparent 50%);
  }
  .container { max-width: 720px; margin: 0 auto; }

  /* === 顶栏 === */
  .top-bar {
    text-align: center;
    padding: 24px 0 16px;
  }
  .top-bar h1 {
    font-size: 22px;
    background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 2px;
  }
  .top-bar .date { color: var(--text-dim); font-size: 12px; }

  /* === 总分卡片 === */
  .score-hero {
    background: linear-gradient(135deg, #1e1b4b, #1e293b);
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .score-hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #818cf8, #c084fc, #f472b6, #818cf8);
    background-size: 200% 100%;
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .score-hero-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .score-hero-left { text-align: left; }
  .score-hero-left .label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
  .score-hero-left .big { font-size: 42px; font-weight: 900; color: #818cf8; line-height: 1; }
  .score-hero-left .unit { font-size: 14px; color: var(--text-dim); margin-left: 4px; }
  .score-hero-right { text-align: right; flex-shrink: 0; }
  .identity-badge {
    display: inline-block;
    padding: 6px 14px;
    background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 20px;
    font-size: 13px;
    color: #a5b4fc;
    margin-bottom: 8px;
  }
  .phase-tag {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    margin-right: 4px;
  }
  .phase-tag.red { background: rgba(239,68,68,0.15); color: #f87171; }
  .phase-tag.yellow { background: rgba(234,179,8,0.15); color: #fbbf24; }
  .phase-tag.green { background: rgba(34,197,94,0.15); color: #4ade80; }

  .progress-bar {
    margin-top: 14px;
    background: rgba(255,255,255,0.06);
    border-radius: 6px;
    height: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.6s ease;
    background: linear-gradient(90deg, #818cf8, #c084fc);
  }
  .progress-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    text-align: right;
  }

  /* === 统计条 === */
  .stats-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat-pill {
    flex: 1;
    min-width: 100px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 10px 14px;
    text-align: center;
  }
  .stat-pill .num { font-size: 20px; font-weight: 800; }
  .stat-pill .lbl { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

  /* === 六维属性 === */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .score-hero-row { flex-direction: column; align-items: flex-start; }
    .score-hero-right { text-align: left; }
  }
  .stat-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 12px;
  }
  .stat-card .icon { font-size: 18px; margin-bottom: 4px; }
  .stat-card .name { font-size: 12px; font-weight: 600; }
  .stat-card .level { font-size: 18px; font-weight: 800; margin: 4px 0 2px; }
  .stat-card .xp { font-size: 10px; color: var(--text-dim); }
  .xp-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; margin-top: 6px; }
  .xp-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

  /* === 趋势面板 === */
  .trend-panel {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .trend-panel h3 { font-size: 13px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .trend-chart { display: flex; align-items: flex-end; gap: 4px; height: 60px; }
  .trend-bar {
    flex: 1;
    background: rgba(99,102,241,0.3);
    border-radius: 3px 3px 0 0;
    min-height: 4px;
    transition: height 0.3s ease;
    position: relative;
  }
  .trend-bar.today { background: var(--accent); }
  .trend-bar-label {
    font-size: 9px;
    color: var(--text-dim);
    text-align: center;
    margin-top: 4px;
  }
  .trend-wrapper { display: flex; align-items: flex-end; }
  .trend-col { flex: 1; display: flex; flex-direction: column; align-items: center; }

  /* === 定投 === */
  .invest-section {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .invest-section h3 { font-size: 13px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .invest-input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .invest-input-row label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
  .invest-input {
    width: 100px; padding: 6px 10px; background: rgba(255,255,255,0.06);
    border: 1px solid #334155; border-radius: 6px; color: var(--text);
    font-size: 14px; font-weight: 600; text-align: right; outline: none;
  }
  .invest-input:focus { border-color: var(--yellow); }
  .invest-input::placeholder { color: #475569; }
  .invest-goals { display: flex; flex-direction: column; gap: 6px; }
  .invest-goal {
    display: flex; align-items: center; gap: 8px; font-size: 11px;
  }
  .invest-goal .goal-name { width: 50px; color: var(--text-dim); }
  .invest-goal .goal-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
  .invest-goal .goal-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
  .invest-goal .goal-val { width: 40px; text-align: right; color: var(--text-dim); }

  /* === 习惯区 === */
  .habit-section {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .habit-section.locked { opacity: 0.35; pointer-events: none; }
  .habit-section-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .habit-section .badge {
    padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700;
  }
  .habit-section .badge.red { background: rgba(239,68,68,0.15); color: #f87171; }
  .habit-section .badge.yellow { background: rgba(234,179,8,0.15); color: #fbbf24; }
  .habit-section .badge.green { background: rgba(34,197,94,0.15); color: #4ade80; }
  .habit-section .title { font-size: 13px; font-weight: 700; }
  .habit-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; background: rgba(255,255,255,0.02);
    border-radius: 8px; margin-bottom: 4px; cursor: pointer;
    transition: background 0.15s;
  }
  .habit-item:hover { background: rgba(255,255,255,0.05); }
  .habit-item.weekly { border-left: 2px dashed rgba(255,255,255,0.08); }
  .habit-check {
    width: 20px; height: 20px; border-radius: 5px;
    border: 2px solid #475569; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; font-size: 11px;
    transition: all 0.2s;
  }
  .habit-item.done .habit-check { border-color: var(--accent); background: var(--accent); }
  .habit-item.done .habit-label { text-decoration: line-through; opacity: 0.4; }
  .habit-label { flex: 1; font-size: 12px; }
  .habit-pts { font-size: 10px; color: var(--accent); opacity: 0.4; font-weight: 600; }
  .habit-freq { font-size: 9px; padding: 1px 5px; border-radius: 3px; background: rgba(255,255,255,0.06); color: var(--text-dim); }

  /* === 能量日记 === */
  .energy-section {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .energy-section h3 { font-size: 13px; margin-bottom: 8px; }
  .energy-row { margin-bottom: 8px; }
  .energy-row label { font-size: 11px; color: var(--text-dim); display: block; margin-bottom: 3px; }
  .energy-input {
    width: 100%; padding: 6px 10px; background: rgba(255,255,255,0.06);
    border: 1px solid #334155; border-radius: 6px; color: var(--text);
    font-size: 12px; outline: none; resize: none;
  }
  .energy-input:focus { border-color: var(--accent); }

  /* === 存档日志 === */
  .log-section {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .log-section h3 { font-size: 13px; margin-bottom: 10px; }
  .log-timeline { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
  .log-entry { display: flex; gap: 8px; font-size: 11px; }
  .log-entry .log-date { color: var(--text-dim); white-space: nowrap; min-width: 70px; }
  .log-entry .log-dot { color: var(--accent); }
  .log-entry .log-text { color: var(--text); }

  /* === 告警 === */
  .alert-box {
    background: rgba(234,179,8,0.08);
    border: 1px solid rgba(234,179,8,0.2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 16px;
    font-size: 12px;
    display: none;
  }
  .alert-box.show { display: block; }
  .alert-box.warn { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); }
  .alert-box .alert-icon { margin-right: 6px; }

  /* === 底部操作 === */
  .footer-actions {
    display: flex; gap: 8px; justify-content: center; margin: 20px 0 30px; flex-wrap: wrap;
  }
  .footer-btn {
    padding: 8px 16px; border-radius: 8px; font-size: 12px; cursor: pointer;
    border: 1px solid; background: transparent; transition: background 0.15s;
  }
  .btn-export { border-color: rgba(99,102,241,0.3); color: #818cf8; }
  .btn-export:hover { background: rgba(99,102,241,0.1); }
  .btn-review { border-color: rgba(34,197,94,0.3); color: #4ade80; }
  .btn-review:hover { background: rgba(34,197,94,0.1); }
  .btn-settings { border-color: rgba(148,163,184,0.3); color: #94a3b8; }
  .btn-settings:hover { background: rgba(148,163,184,0.1); }

  .world-running {
    text-align: center; padding: 8px; font-size: 11px; color: var(--text-dim);
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-bottom: 12px;
  }
  .world-running .pulse {
    width: 6px; height: 6px; background: var(--green); border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* === 周复盘弹窗 === */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.hidden { display: none; }
  .modal-box {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 16px; padding: 24px; max-width: 400px; width: 100%;
    max-height: 80vh; overflow-y: auto;
  }
  .modal-box h2 { font-size: 16px; margin-bottom: 16px; }
  .modal-q { margin-bottom: 14px; }
  .modal-q label { font-size: 12px; color: var(--text-dim); display: block; margin-bottom: 4px; }
  .modal-q select, .modal-q input {
    width: 100%; padding: 8px; background: rgba(255,255,255,0.06);
    border: 1px solid #334155; border-radius: 6px; color: var(--text);
    font-size: 12px; outline: none;
  }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal-actions button {
    flex: 1; padding: 10px; border-radius: 8px; font-size: 13px;
    cursor: pointer; border: 1px solid; background: transparent;
  }
  .modal-save { border-color: var(--accent); color: var(--accent); }
  .modal-cancel { border-color: #475569; color: var(--text-dim); }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1>🌍 Earth Online</h1>
    <div class="date" id="todayDate"></div>
  </div>

  <div class="world-running">
    <span class="pulse"></span>
    <span>地球持续运转中 · 数据永久保存 · 系统随你进化</span>
  </div>

  <!-- 告警 -->
  <div class="alert-box" id="alertBox"></div>

  <!-- 总分卡片 -->
  <div class="score-hero">
    <div class="score-hero-row">
      <div class="score-hero-left">
        <div class="label">累计总分</div>
        <div><span class="big" id="totalScore">0</span><span class="unit">分</span></div>
      </div>
      <div class="score-hero-right">
        <div class="identity-badge" id="identityBadge">🌱 开始的人</div>
        <div>
          <span class="phase-tag red" id="phaseTag">🔴 生存</span>
        </div>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="phaseProgress"></div></div>
    <div class="progress-label" id="phaseLabel">距下一阶段还差 -- 分</div>
  </div>

  <!-- 统计条 -->
  <div class="stats-row">
    <div class="stat-pill">
      <div class="num" id="streakCount" style="color:var(--orange)">0</div>
      <div class="lbl">🔥 连续天</div>
    </div>
    <div class="stat-pill">
      <div class="num" id="bestStreak" style="color:var(--yellow)">0</div>
      <div class="lbl">🏆 最长纪录</div>
    </div>
    <div class="stat-pill">
      <div class="num" id="daysActive" style="color:var(--green)">0</div>
      <div class="lbl">📅 活跃天数</div>
    </div>
  </div>

  <!-- 趋势面板 -->
  <div class="trend-panel">
    <h3>📈 近7天趋势</h3>
    <div class="trend-chart" id="trendChart"></div>
  </div>

  <!-- 六维属性 -->
  <div class="stats-grid" id="statsGrid"></div>

  <!-- 定投 -->
  <div class="invest-section">
    <h3>💰 定投</h3>
    <div class="invest-input-row">
      <label>今日投入</label>
      <input type="number" class="invest-input" id="investInput" placeholder="0" min="0" step="10">
      <span style="font-size:12px;color:var(--text-dim)">元</span>
    </div>
    <div class="invest-goals" id="investGoals"></div>
  </div>

  <!-- 习惯区 -->
  <div id="layersContainer"></div>

  <!-- 能量日记 -->
  <div class="energy-section">
    <h3>📝 能量日记</h3>
    <div class="energy-row">
      <label>😰 今天让我更紧的事：</label>
      <input class="energy-input" id="energyTight" placeholder="写一行就行">
    </div>
    <div class="energy-row">
      <label>😌 今天让我松一点的事：</label>
      <input class="energy-input" id="energyLoose" placeholder="很小的事也可以">
    </div>
  </div>

  <!-- 存档日志 -->
  <div class="log-section">
    <h3>📖 存档日志</h3>
    <div class="log-timeline" id="logTimeline"></div>
  </div>

  <!-- 主线任务 -->
  <div class="habit-section">
    <div class="habit-section-header">
      <span class="title">📜 主线任务</span>
    </div>
    <div id="questList"></div>
  </div>

  <!-- 底部操作 -->
  <div class="footer-actions">
    <button class="footer-btn btn-review" onclick="openReview()">🧭 周复盘</button>
    <button class="footer-btn btn-export" onclick="exportData()">📤 导出</button>
    <button class="footer-btn btn-settings" onclick="toggleSettings()">⚙️ 设置</button>
  </div>
</div>

<!-- 周复盘弹窗 -->
<div class="modal-overlay hidden" id="reviewModal">
  <div class="modal-box">
    <h2>🧭 周复盘</h2>
    <div class="modal-q">
      <label>1. 这周哪个习惯对我帮助最大？</label>
      <select id="reviewBest"><option value="">-- 选择一个 --</option></select>
    </div>
    <div class="modal-q">
      <label>2. 这周哪个习惯最没用/太累？</label>
      <select id="reviewWorst"><option value="">-- 选择一个 --</option></select>
    </div>
    <div class="modal-q">
      <label>3. 这周我更像我想成为的人了吗？</label>
      <select id="reviewIdentity">
        <option value="5">5 - 很像</option>
        <option value="4">4 - 比较像</option>
        <option value="3" selected>3 - 一般</option>
        <option value="2">2 - 不太像</option>
        <option value="1">1 - 完全不像</option>
      </select>
    </div>
    <div class="modal-q">
      <label>4. 这周有什么想对自己说的？</label>
      <input class="energy-input" id="reviewNote" placeholder="随便写">
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeReview()">取消</button>
      <button class="modal-save" onclick="saveReview()">保存</button>
    </div>
  </div>
</div>

<!-- 设置面板 -->
<div class="modal-overlay hidden" id="settingsModal">
  <div class="modal-box">
    <h2>⚙️ 系统设置</h2>
    <div class="modal-q">
      <label>手动切换阶段（测试用）</label>
      <select id="settingsPhase">
        <option value="survival">🔴 生存阶段</option>
        <option value="stabilize">🟡 稳定阶段</option>
        <option value="growth">🟢 成长阶段</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeSettings()">取消</button>
      <button class="modal-save" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<script>
// ========== 配置 ==========
const LEVELS = [0, 50, 150, 350, 600, 1000];
const modules = [
  { id: 'hp', name: '健康', icon: '💪', color: '#22c55e' },
  { id: 'mp', name: '精神', icon: '🧘', color: '#a855f7' },
  { id: 'gp', name: '财务', icon: '💰', color: '#eab308' },
  { id: 'ap', name: '外貌', icon: '✨', color: '#f43f5e' },
  { id: 'sp', name: '专业', icon: '📚', color: '#3b82f6' },
  { id: 'rp', name: '关系', icon: '💕', color: '#ec4899' }
];

const PHASES = [
  { id: 'survival', name: '生存', icon: '🔴', tag: '先止血', threshold: 0, nextThreshold: 56, layers: ['survival'] },
  { id: 'stabilize', name: '稳定', icon: '🟡', tag: '再走路', threshold: 56, nextThreshold: 206, layers: ['survival', 'stabilize'] },
  { id: 'growth', name: '成长', icon: '🟢', tag: '最后跑步', threshold: 206, nextThreshold: null, layers: ['survival', 'stabilize', 'growth'] }
];

const INVEST_GOALS = [
  { name: '近视手术', target: 50000, color: '#3b82f6' },
  { name: '中期底气', target: 150000, color: '#a855f7' },
  { name: '自由价格', target: 1000000, color: '#eab308' }
];

const QUESTS = [

// ========== 数据 ==========
function getDateKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getWeekKey() {
  const d = new Date();
  const day = d.getDay();
  const monday = new Date(d);
  monday.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return `w_${monday.getFullYear()}_${String(monday.getMonth()+1).padStart(2,'0')}_${String(monday.getDate()).padStart(2,'0')}`;
}

function loadData() {
  try {
    const raw = localStorage.getItem('earth-online-v2');
    if (raw) { const d = JSON.parse(raw); if (d.meta?.version === '2.0') return d; }
  } catch(e) {}
  return defaultData();
}
function defaultData() {
  return {
    xp: {hp:0,mp:0,gp:0,ap:0,sp:0,rp:0},
    daily: {},
    investHistory: [],
    currentPhase: 'survival',
    phaseHistory: [{ phase: 'survival', startedAt: getDateKey(), note: '系统启动' }],
    logs: [{ date: getDateKey(), text: '创建了 Earth Online 系统，第一阶段：止血' }],
    reviews: [],
    meta: { version: '2.0', createdAt: getDateKey() }
  };
}
function saveData(data) { localStorage.setItem('earth-online-v2', JSON.stringify(data)); }

function addLog(text) {
  const data = loadData();
  data.logs = data.logs || [];
  data.logs.unshift({ date: getDateKey(), text });
  saveData(data);
}

// ========== 计算 ==========
function calcAllScores(data) {
  let totalScore = 0;
  for (const day of Object.values(data.daily)) {
    totalScore += day.score || 0;
  }
  return totalScore;
}

function calcDayScore(data, dateKey) {
  const day = data.daily[dateKey];
  if (!day) return { total: 0, survivalDone: 0, survivalTotal: 8, survivalPass: false };
  const habits = day.habits || {};
  const phase = PHASES.find(p => p.id === data.currentPhase) || PHASES[0];
  let total = 0, survivalDone = 0;
  allLayers.forEach(layer => {
    if (!phase.layers.includes(layer.id)) return;
    layer.habits.forEach((h, i) => {
      const key = h.freq === 'weekly' ? `w_${h.weekKey}` : `${layer.id}_${i}`;
      if (habits[key]) {
        total += h.pts;
        if (layer.id === 'survival' && h.freq === 'daily') survivalDone++;
      }
    });
  });
  return { total, survivalDone, survivalTotal: 8, survivalPass: survivalDone >= 8 };
}

function checkPhaseUpgrade(data) {
  const phase = PHASES.find(p => p.id === data.currentPhase);
  if (!phase || phase.nextThreshold === null) return null;

  const totalScore = calcAllScores(data);

  // 生存→稳定：连续7天全通关
  if (phase.id === 'survival') {
    let streak = 0;
    const today = new Date();
    for (let i = 0; i < 7; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const info = calcDayScore(data, key);
      if (info.survivalPass) streak++;
      else break;
    }
    if (streak >= 7) return 'stabilize';
  }

  // 稳定→成长：累计≥206
  if (phase.id === 'stabilize' && totalScore >= 206) {
    return 'growth';
  }

  return null;
}

function calcStreak(data) {
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const info = calcDayScore(data, key);
    if (!info.total && i === 0) continue;
    if (info.survivalPass || info.total > 0) streak++;
    else if (i > 0) break;
  }
  return streak;
}

function calcBestStreak(data) {
  let best = 0, current = 0;
  const dates = Object.keys(data.daily).sort();
  for (const key of dates) {
    const info = calcDayScore(data, key);
    if (info.survivalPass || info.total > 0) current++;
    else current = 0;
    if (current > best) best = current;
  }
  return best;
}

function calcInvestTotal(data) {
  return (data.investHistory || []).reduce((s, r) => s + (r.amount || 0), 0);
}

// ========== 渲染 ==========
function render() {
  const data = loadData();
  const dk = getDateKey();
  if (!data.daily[dk]) {
    data.daily[dk] = { habits: {}, invest: 0, energy: {tight:'',loose:''}, score: 0, survivalPass: false };
    saveData(data);
  }
  const day = data.daily[dk];
  const habits = day.habits || {};
  const phase = PHASES.find(p => p.id === data.currentPhase) || PHASES[0];

  // 检查升级
  const upgrade = checkPhaseUpgrade(data);
  if (upgrade) {
    data.currentPhase = upgrade;
    const np = PHASES.find(p => p.id === upgrade);
    data.phaseHistory.push({ phase: upgrade, startedAt: dk, note: `自动升级: ${np.name}` });
    data.logs.unshift({ date: dk, text: `🎉 进入${np.icon} ${np.name}阶段 — ${np.tag}` });
    saveData(data);
  }

  // 日期
  const now = new Date();
  const weekDays = ['日','一','二','三','四','五','六'];
  document.getElementById('todayDate').textContent = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} 周${weekDays[now.getDay()]}`;

  // 累计总分
  const totalScore = calcAllScores(data);
  document.getElementById('totalScore').textContent = totalScore;

  // 身份
  let identity = IDENTITIES[0].label;
  for (const id of IDENTITIES) { if (totalScore >= id.minScore) identity = id.label; }
  document.getElementById('identityBadge').textContent = identity;

  // 阶段标签
  const pt = document.getElementById('phaseTag');
  pt.textContent = `${phase.icon} ${phase.name}`;
  pt.className = `phase-tag ${phase.id === 'survival' ? 'red' : phase.id === 'stabilize' ? 'yellow' : 'green'}`;

  // 阶段进度
  const pp = document.getElementById('phaseProgress');
  const pl = document.getElementById('phaseLabel');
  if (phase.nextThreshold !== null) {
    const prev = phase.threshold;
    const progress = Math.min(((totalScore - prev) / (phase.nextThreshold - prev)) * 100, 100);
    pp.style.width = `${progress}%`;
    pl.textContent = `距${PHASES[PHASES.indexOf(phase)+1]?.name || '下一阶段'}还差 ${Math.max(phase.nextThreshold - totalScore, 0)} 分`;
  } else {
    pp.style.width = '100%';
    pl.textContent = '已达最高阶段 🌟';
  }

  // 统计条
  document.getElementById('streakCount').textContent = calcStreak(data);
  document.getElementById('bestStreak').textContent = calcBestStreak(data);
  document.getElementById('daysActive').textContent = Object.keys(data.daily).filter(k => data.daily[k].score > 0).length;

  // 趋势图
  renderTrend(data);

  // 六维
  renderModules(data);

  // 定投
  renderInvest(data);

  // 习惯
  renderHabits(data, habits);

  // 能量日记
  const et = document.getElementById('energyTight');
  const el = document.getElementById('energyLoose');
  et.value = (day.energy?.tight) || '';
  el.value = (day.energy?.loose) || '';
  et.oninput = () => saveEnergyField('tight', et.value);
  el.oninput = () => saveEnergyField('loose', el.value);

  // 存档日志
  renderLogs(data);

  // 主线任务
  renderQuests();

  // 告警
  renderAlert(data);

  // 设置
  document.getElementById('settingsPhase').value = data.currentPhase;
}

function renderTrend(data) {
  const chart = document.getElementById('trendChart');
  const today = new Date();
  let maxScore = 1;
  const scores = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const info = calcDayScore(data, key);
    scores.push({ key, score: info.total, isToday: i === 0 });
    if (info.total > maxScore) maxScore = info.total;
  }
  const days = ['日','一','二','三','四','五','六'];
  chart.innerHTML = scores.map(s => {
    const h = Math.max((s.score / maxScore) * 50, 4);
    const dow = new Date(s.key).getDay();
    return `<div class="trend-col">
      <div class="trend-bar ${s.isToday ? 'today' : ''}" style="height:${h}px" title="${s.key}: ${s.score}分"></div>
      <div class="trend-bar-label">${s.isToday ? '今' : '周' + days[dow]}</div>
    </div>`;
  }).join('');
}

function renderModules(data) {
  const grid = document.getElementById('statsGrid');
  grid.innerHTML = '';
  modules.forEach(m => {
    const xp = data.xp[m.id] || 0;
    let lvl = 0;
    for (let i = LEVELS.length - 1; i >= 0; i--) { if (xp >= LEVELS[i]) { lvl = i; break; } }
    const nextTarget = lvl < LEVELS.length - 1 ? LEVELS[lvl + 1] : LEVELS[lvl];
    const prevTarget = LEVELS[lvl];
    const progress = lvl < LEVELS.length - 1 ? Math.min(((xp - prevTarget) / (nextTarget - prevTarget)) * 100, 100) : 100;
    grid.innerHTML += `<div class="stat-card"><div class="icon">${m.icon}</div><div class="name">${m.name}</div><div class="level" style="color:${m.color}">Lv ${lvl}</div><div class="xp">${xp} / ${nextTarget}</div><div class="xp-bar"><div class="xp-bar-fill" style="width:${progress}%;background:${m.color}"></div></div></div>`;
  });
}

function renderInvest(data) {
  const input = document.getElementById('investInput');
  input.value = data.daily[getDateKey()]?.invest || '';
  input.oninput = function() {
    const amount = parseInt(this.value) || 0;
    const d = loadData();
    const dk = getDateKey();
    if (!d.daily[dk]) d.daily[dk] = { habits: {}, invest: 0, energy: {tight:'',loose:''}, score: 0, survivalPass: false };
    d.daily[dk].invest = amount;
    const idx = d.investHistory.findIndex(r => r.date === dk);
    if (idx >= 0) d.investHistory[idx].amount = amount;
    else d.investHistory.push({ date: dk, amount });
    saveData(d);
    renderInvestGoals(d);
  };
  renderInvestGoals(data);
}

function renderInvestGoals(data) {
  const total = calcInvestTotal(data);
  document.getElementById('investGoals').innerHTML = INVEST_GOALS.map(g => {
    const pct = Math.min((total / g.target) * 100, 100);
    return `<div class="invest-goal">
      <span class="goal-name">${g.name}</span>
      <div class="goal-bar"><div class="goal-fill" style="width:${pct}%;background:${g.color}"></div></div>
      <span class="goal-val">¥${total.toLocaleString()}/${(g.target/10000).toFixed(0)}万</span>
    </div>`;
  }).join('');
}

function renderHabits(data, habits) {
  const lc = document.getElementById('layersContainer');
  lc.innerHTML = '';
  const phase = PHASES.find(p => p.id === data.currentPhase);
  const visibleIds = phase?.layers || ['survival'];

  allLayers.forEach(layer => {
    const visible = visibleIds.includes(layer.id);
    let html = `<div class="habit-section ${!visible ? 'locked' : ''}">`;
    html += `<div class="habit-section-header">`;
    html += `<span class="badge ${layer.badgeClass}">${layer.badge}</span>`;
    html += `<span class="title">${layer.desc}</span>`;
    html += `</div>`;

    if (!visible) {
      html += `<div style="text-align:center;padding:16px;font-size:11px;color:var(--text-dim)">🔒 升级后解锁</div>`;
    } else {
      layer.habits.forEach((h, i) => {
        const key = h.freq === 'weekly' ? `w_${h.weekKey}` : `${layer.id}_${i}`;
        const done = habits[key] ? 'done' : '';
        const freqTag = h.freq === 'weekly' ? '<span class="habit-freq">每周</span>' : '';
        html += `<div class="habit-item ${done} ${h.freq === 'weekly' ? 'weekly' : ''}" onclick="toggleHabit('${layer.id}', ${i})">`;
        html += `<div class="habit-check">${done ? '✓' : ''}</div>`;
        html += `<span class="habit-label">${h.text} ${freqTag}</span>`;
        html += `<span class="habit-pts">+${h.pts}</span>`;
        html += `</div>`;
      });
    }
    html += `</div>`;
    lc.innerHTML += html;
  });
}

function toggleHabit(layerId, idx) {
  const layer = allLayers.find(l => l.id === layerId);
  if (!layer) return;
  const h = layer.habits[idx];
  if (!h) return;
  const key = h.freq === 'weekly' ? `w_${h.weekKey}` : `${layerId}_${idx}`;

  const data = loadData();
  const dk = getDateKey();
  if (!data.daily[dk]) data.daily[dk] = { habits: {}, invest: 0, energy: {tight:'',loose:''}, score: 0, survivalPass: false };
  if (!data.daily[dk].habits) data.daily[dk].habits = {};
  data.daily[dk].habits[key] = !data.daily[dk].habits[key];

  if (data.daily[dk].habits[key]) {
    data.xp[h.mod] = (data.xp[h.mod] || 0) + h.pts;
  } else {
    data.xp[h.mod] = Math.max(0, (data.xp[h.mod] || 0) - h.pts);
  }

  // 重算当日得分
  const { survivalPass } = calcDayScore(data, dk);
  // 重新计算该日总分
  let dayTotal = 0;
  const phase = PHASES.find(p => p.id === data.currentPhase);
  const visibleIds = phase?.layers || ['survival'];
  allLayers.forEach(l => {
    if (!visibleIds.includes(l.id)) return;
    l.habits.forEach((hh, ii) => {
      const kk = hh.freq === 'weekly' ? `w_${hh.weekKey}` : `${l.id}_${ii}`;
      if (data.daily[dk].habits[kk]) dayTotal += hh.pts;
    });
  });
  data.daily[dk].score = dayTotal;
  data.daily[dk].survivalPass = survivalPass;
  saveData(data);
  render();
}

function saveEnergyField(field, value) {
  const data = loadData();
  const dk = getDateKey();
  if (!data.daily[dk]) data.daily[dk] = { habits: {}, invest: 0, energy: {tight:'',loose:''}, score: 0, survivalPass: false };
  if (!data.daily[dk].energy) data.daily[dk].energy = { tight: '', loose: '' };
  data.daily[dk].energy[field] = value;
  saveData(data);
}

    `<div class="log-entry"><span class="log-date">${l.date}</span><span class="log-dot">●</span><span class="log-text">${l.text}</span></div>`
  ).join('') || '<div style="font-size:11px;color:var(--text-dim)">还没有记录</div>';
}

function renderQuests() {
  document.getElementById('questList').innerHTML = QUESTS.map(q =>
    `<div class="habit-item" style="cursor:default"><span style="font-size:16px">${q.icon}</span><span class="habit-label"><div style="font-size:12px;font-weight:600">${q.name}</div><div style="font-size:10px;color:var(--text-dim)">${q.desc}</div></span></div>`
  ).join('');
}

function renderAlert(data) {
  const box = document.getElementById('alertBox');
  // 检查连续未打卡天数
  let gapDays = 0;
  const today = new Date();
  for (let i = 1; i <= 7; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const info = calcDayScore(data, key);
    if (info.total > 0) break;
    gapDays++;
  }

  if (gapDays >= 3) {
    box.className = 'alert-box show warn';
    box.innerHTML = `<span class="alert-icon">⚠️</span>系统检测到 ${gapDays} 天没打卡了。没关系，今天只做一个习惯就好。`;
  } else {
    const todayInfo = calcDayScore(data, getDateKey());
    if (todayInfo.total === 0) {
      box.className = 'alert-box show';
      box.innerHTML = `<span class="alert-icon">💡</span>今天还没打卡。从最简单的开始就好 🐾`;
    } else {
      box.className = 'alert-box';
    }
  }
}

function toggleSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }
function saveSettings() {
  const newPhase = document.getElementById('settingsPhase').value;
  const data = loadData();
  if (newPhase !== data.currentPhase) {
    data.currentPhase = newPhase;
    const np = PHASES.find(p => p.id === newPhase);
    data.phaseHistory.push({ phase: newPhase, startedAt: getDateKey(), note: '手动切换' });
    data.logs.unshift({ date: getDateKey(), text: `⚙️ 手动切换至${np.icon} ${np.name}阶段` });
    saveData(data);
  }
  closeSettings();
  render();
}

// ========== 导出 ==========
function exportData() {
  const data = loadData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `earth-online-${getDateKey()}.json`;
  a.click();
}

// 自动检测新天
let lastDate = getDateKey();
setInterval(() => {
  if (getDateKey() !== lastDate) { lastDate = getDateKey(); render(); }
}, 60000);

render();
</script>
</body>
</html>
